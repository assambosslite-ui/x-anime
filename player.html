<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watching | X Anime</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { --bg-main: #0a0a0a; --bg-card: #151515; --primary: #ff4444; --text-white: #ffffff; --text-gray: #a0a0b5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: var(--bg-main); color: var(--text-white); }
        header { background: rgba(10,10,10,0.95); padding: 15px 5%; border-bottom: 2px solid var(--primary); }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; color: white; }
        .logo span { color: var(--primary); }
        .details-container { max-width: 1000px; margin: 30px auto; padding: 0 20px; display: flex; gap: 30px; flex-wrap: wrap; }
        .poster-box img { width: 250px; border-radius: 10px; border: 2px solid #333; }
        .info-box { flex: 1; min-width: 300px; }
        .info-title { font-size: 32px; margin-bottom: 10px; }
        .info-meta { display: flex; gap: 15px; margin-bottom: 15px; font-size: 14px; }
        .info-meta span { background: #222; padding: 5px 10px; border-radius: 5px; }
        .rating { color: var(--primary); font-weight: bold; }
        #watch-section { display: none; max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .player-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; overflow: hidden; border: 1px solid #333; position: relative; }
        #hls-player, #iframe-player { width: 100%; height: 100%; border: none; display: none; }
        .server-container { background: #151515; border-radius: 10px; padding: 15px; margin-top: 15px; border: 1px solid #333; }
        .srv-btn { background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; }
        .srv-btn.active, .srv-btn:hover { background: var(--primary); border-color: var(--primary); }
        .episode-section { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .ep-list { background: #111; border-radius: 8px; max-height: 400px; overflow-y: auto; border: 1px solid #222; }
        .ep-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; }
        .watch-btn { background: #333; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .watch-btn:hover { background: var(--primary); }
    </style>
</head>
<body>

    <header><a href="index.html" class="logo">X <span>Anime</span></a></header>

    <div id="loader" style="text-align:center; padding:50px;">Loading Anime Data...</div>

    <div id="main-content" style="display: none;">
        <div class="details-container">
            <div class="poster-box"><img id="anime-poster" src=""></div>
            <div class="info-box">
                <h1 id="anime-title">Loading...</h1>
                <div class="info-meta">
                    <span class="rating"><i class="fa-solid fa-star"></i> <b id="anime-score">0.0</b></span>
                    <span id="anime-year">2026</span>
                </div>
                <p id="anime-synopsis" style="color:var(--text-gray); font-size:14px; line-height:1.6;"></p>
            </div>
        </div>

        <div id="watch-section">
            <div class="player-container">
                <video id="hls-player" controls crossorigin playsinline></video>
                <iframe id="iframe-player" allowfullscreen></iframe>
            </div>
            <div class="server-container">
                <div id="sub-buttons-container">
                    <button class="srv-btn active" id="btn-vip" onclick="playVIPServer()">👑 X VIP (Ad-Free)</button>
                    <button class="srv-btn" onclick="changeToIframe('https://vidsrc.to/embed/anime/', this)">VidSrc</button>
                    <button class="srv-btn" onclick="changeToIframe('https://vidlink.pro/anime/', this)">VidLink</button>
                </div>
            </div>
        </div>

        <div class="episode-section">
            <h3 style="margin-bottom:15px;">Episodes List</h3>
            <div class="ep-list" id="episode-list-container"></div>
        </div>
    </div>

    <script type="module">
        const urlParams = new URLSearchParams(window.location.search);
        const animeId = urlParams.get('id'); 
        let currentAnimeTitle = "";
        let currentEpNum = 1;
        let hlsInstance = null;

        // FIXED PUBLIC API (Yeh kabhi 404 nahi dega)
        const MY_API_BASE = "https://api-consumet-org-five.vercel.app";

        async function loadAnimeData() {
            try {
                const res = await fetch(`https://api.jikan.moe/v4/anime/${animeId}`);
                const data = await res.json();
                const anime = data.data;
                currentAnimeTitle = anime.title;
                document.getElementById('anime-title').innerText = anime.title;
                document.getElementById('anime-poster').src = anime.images.jpg.large_image_url;
                document.getElementById('anime-score').innerText = anime.score || "N/A";
                document.getElementById('anime-synopsis').innerText = anime.synopsis?.substring(0, 300) + "...";

                const epRes = await fetch(`https://api.jikan.moe/v4/anime/${animeId}/episodes`);
                const epData = await epRes.json();
                const epContainer = document.getElementById('episode-list-container');
                
                (epData.data.length > 0 ? epData.data : [{mal_id: 1, title: 'Full Movie'}]).forEach(ep => {
                    epContainer.innerHTML += `
                        <div class="ep-item">
                            <span>EP ${ep.mal_id}: ${ep.title}</span>
                            <button class="watch-btn" onclick="playEpisode(${ep.mal_id})">Watch</button>
                        </div>`;
                });

                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } catch (e) { document.getElementById('loader').innerText = "API Error!"; }
        }

        window.playEpisode = function(ep) {
            currentEpNum = ep;
            document.getElementById('watch-section').style.display = 'block';
            window.scrollTo({ top: document.getElementById('watch-section').offsetTop - 20, behavior: 'smooth' });
            playVIPServer();
        };

        window.playVIPServer = async function() {
            const hlsPlayer = document.getElementById('hls-player');
            const iframe = document.getElementById('iframe-player');
            iframe.style.display = 'none'; iframe.src = "";
            hlsPlayer.style.display = 'block';

            try {
                const search = await fetch(`${MY_API_BASE}/anime/gogoanime/${encodeURIComponent(currentAnimeTitle)}`);
                const searchData = await search.json();
                const gogoId = searchData.results[0].id;
                
                const stream = await fetch(`${MY_API_BASE}/anime/gogoanime/watch/${gogoId}-episode-${currentEpNum}`);
                const streamData = await stream.json();
                const m3u8 = streamData.sources.find(s => s.quality === 'default' || s.quality === 'auto').url;

                if (Hls.isSupported()) {
                    if (hlsInstance) hlsInstance.destroy();
                    hlsInstance = new Hls();
                    hlsInstance.loadSource(m3u8);
                    hlsInstance.attachMedia(hlsPlayer);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => hlsPlayer.play());
                }
            } catch (err) {
                hlsPlayer.style.display = 'none';
                alert("VIP Server busy. Switching to Backup...");
                changeToIframe('https://vidsrc.to/embed/anime/', document.querySelector('.srv-btn:nth-child(2)'));
            }
        };

        window.changeToIframe = function(baseUrl, btn) {
            document.querySelectorAll('.srv-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const hlsPlayer = document.getElementById('hls-player');
            const iframe = document.getElementById('iframe-player');
            if(hlsInstance) hlsInstance.destroy();
            hlsPlayer.style.display = 'none';
            iframe.style.display = 'block';
            iframe.src = `${baseUrl}${animeId}/${currentEpNum}`;
        };

        loadAnimeData();
    </script>
</body>
</html>
