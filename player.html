<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watching | X Anime</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        /* === X Anime Original RED Theme === */
        :root { --bg-main: #0a0a0a; --bg-card: #151515; --primary: #ff4444; --text-white: #ffffff; --text-gray: #a0a0b5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: var(--bg-main); color: var(--text-white); }
        a { text-decoration: none; color: inherit; }

        header { background: rgba(10,10,10,0.95); padding: 15px 5%; border-bottom: 2px solid var(--primary); }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .logo span { color: var(--primary); }

        .details-container { max-width: 1000px; margin: 30px auto; padding: 0 20px; display: flex; gap: 30px; flex-wrap: wrap; }
        .poster-box img { width: 250px; border-radius: 10px; border: 2px solid #333; }
        .info-box { flex: 1; min-width: 300px; }
        .info-title { font-size: 32px; margin-bottom: 10px; }
        .info-meta { display: flex; gap: 15px; margin-bottom: 15px; font-size: 14px; }
        .info-meta span { background: #222; padding: 5px 10px; border-radius: 5px; }

        /* Video Section */
        .watch-container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; overflow: hidden; border: 1px solid #333; position: relative; }
        #hls-player { width: 100%; height: 100%; outline: none; background: #000; }
        #video-iframe { width: 100%; height: 100%; border: none; }

        /* Server Buttons Styling */
        .server-container { background: var(--bg-card); padding: 15px; margin-top: 15px; border-radius: 10px; border: 1px solid #222; }
        .server-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .srv-btn { background: #222; color: #fff; border: 1px solid #333; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .srv-btn:hover, .srv-btn.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 10px rgba(255, 68, 68, 0.4); }

        /* Episode List (List Format) */
        .episode-section { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .ep-header { background: #1a1a1a; padding: 15px; border-radius: 8px 8px 0 0; border-bottom: 2px solid var(--primary); font-weight: bold; }
        .ep-list { background: #111; border-radius: 0 0 8px 8px; max-height: 400px; overflow-y: auto; border: 1px solid #222; }
        .ep-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .ep-item:hover { background: #1a1a1a; }
        .ep-title { font-size: 14px; font-weight: bold; }
        .ep-title span { color: var(--primary); margin-right: 10px; }
        .watch-btn { background: #333; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .watch-btn:hover { background: var(--primary); }

        #loader { text-align: center; padding: 100px; font-size: 20px; color: var(--primary); }
    </style>
</head>
<body>

    <header><a href="index.html" class="logo">X <span>Anime</span></a></header>

    <div id="loader"><i class="fa-solid fa-spinner fa-spin"></i> Loading Anime...</div>

    <div id="main-content" style="display: none;">
        
        <div class="details-container">
            <div class="poster-box"><img id="anime-poster" src=""></div>
            <div class="info-box">
                <h1 id="anime-title">Loading...</h1>
                <div class="info-meta">
                    <span style="color:var(--primary); font-weight:bold;">⭐ <b id="anime-score">0.0</b></span>
                    <span id="anime-year">2026</span>
                </div>
                <p id="anime-synopsis" style="color:var(--text-gray); line-height:1.6; font-size:14px;"></p>
            </div>
        </div>

        <div class="watch-container">
            <div class="player-wrapper">
                <video id="hls-player" controls crossorigin playsinline style="display: none;"></video>
                <iframe id="video-iframe" src="" allowfullscreen style="display: none;"></iframe>
            </div>
            
            <div class="server-container">
                <p style="font-size:12px; color:var(--text-gray); margin-bottom:10px;">Select Server:</p>
                <div class="server-grid">
                    <button class="srv-btn active" id="btn-api" onclick="playAutoAPI()">🔥 X Auto (Ad-Free)</button>
                    <button class="srv-btn" id="btn-vidsrc" onclick="changeServer('vidsrc', this)">VidSrc</button>
                    <button class="srv-btn" id="btn-vidlink" onclick="changeServer('vidlink', this)">VidLink</button>
                    <button class="srv-btn" id="btn-vidstream" onclick="changeServer('vidstream', this)">VidStream</button>
                </div>
            </div>
        </div>

        <div class="episode-section">
            <div class="ep-header"><i class="fa-solid fa-list"></i> EPISODES LIST</div>
            <div class="ep-list" id="episode-list-container"></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Aapka Asli Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBEP4WxbR_1pIWVUV7QyIb1NnVtrZhG5D4",
            authDomain: "x-anime-1a277.firebaseapp.com",
            projectId: "x-anime-1a277",
            storageBucket: "x-anime-1a277.firebasestorage.app",
            messagingSenderId: "160097632444",
            appId: "1:160097632444:web:75160cbb6379e39f5e10b9",
            measurementId: "G-VD1Q5RD99C"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
    </script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const animeId = urlParams.get('id');
        let currentEp = 1;
        let currentAnimeTitle = "";
        let hlsInstance = null;

        // Public Fast API Base
        const MY_API_BASE = "https://api-consumet-org-five.vercel.app";

        async function loadAnimeData() {
            if(!animeId) return;
            try {
                const res = await fetch(`https://api.jikan.moe/v4/anime/${animeId}`);
                const data = await res.json();
                const anime = data.data;

                // Title Format karke save karna
                currentAnimeTitle = anime.title;
                
                document.getElementById('anime-title').innerText = anime.title;
                document.getElementById('anime-poster').src = anime.images.jpg.large_image_url;
                document.getElementById('anime-score').innerText = anime.score || "N/A";
                document.getElementById('anime-year').innerText = anime.year || "Unknown";
                document.getElementById('anime-synopsis').innerText = anime.synopsis?.substring(0, 300) + "...";

                const epRes = await fetch(`https://api.jikan.moe/v4/anime/${animeId}/episodes`);
                const epData = await epRes.json();
                const epContainer = document.getElementById('episode-list-container');

                const episodes = epData.data.length > 0 ? epData.data : [{mal_id: 1, title: 'Full Movie/Anime'}];

                episodes.forEach(ep => {
                    epContainer.innerHTML += `
                        <div class="ep-item">
                            <div class="ep-title"><span>EP ${ep.mal_id}</span> ${ep.title || 'Episode ' + ep.mal_id}</div>
                            <button class="watch-btn" onclick="playEpisode(${ep.mal_id})">Watch</button>
                        </div>`;
                });

                playEpisode(1);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } catch(e) { console.error(e); }
        }

        function playEpisode(num) {
            currentEp = num;
            window.scrollTo({ top: document.querySelector('.player-wrapper').offsetTop - 20, behavior: 'smooth' });
            
            // Default Auto API chalana pehle
            playAutoAPI();
        }

        // === ANIMEDEX / AUTO API LOGIC ===
        async function playAutoAPI() {
            const btn = document.getElementById('btn-api');
            document.querySelectorAll('.srv-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const hlsPlayer = document.getElementById('hls-player');
            const iframe = document.getElementById('video-iframe');
            
            iframe.style.display = 'none';
            iframe.src = "";
            hlsPlayer.style.display = 'block';
            
            try {
                // 1. Title Search
                const query = encodeURIComponent(currentAnimeTitle);
                const searchRes = await fetch(`${MY_API_BASE}/anime/gogoanime/${query}`);
                const searchData = await searchRes.json();
                
                if (!searchData.results || searchData.results.length === 0) throw new Error("Not Found");
                
                const gogoId = searchData.results[0].id;
                
                // 2. Fetch Direct Stream
                const streamRes = await fetch(`${MY_API_BASE}/anime/gogoanime/watch/${gogoId}-episode-${currentEp}`);
                const streamData = await streamRes.json();
                
                // 3. Find 1080p or Auto Quality
                const defaultSource = streamData.sources.find(s => s.quality === '1080p' || s.quality === 'default' || s.quality === 'auto');
                const m3u8Link = defaultSource ? defaultSource.url : streamData.sources[0].url;

                // 4. Play in HLS
                if (Hls.isSupported()) {
                    if (hlsInstance) hlsInstance.destroy();
                    hlsInstance = new Hls();
                    hlsInstance.loadSource(m3u8Link);
                    hlsInstance.attachMedia(hlsPlayer);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                        hlsPlayer.play();
                    });
                } else if (hlsPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                    hlsPlayer.src = m3u8Link;
                    hlsPlayer.play();
                }

            } catch (err) {
                console.log("API Fail, Switching to Backup...");
                // Agar direct video fetch na ho sake, toh turant VidSrc chala do
                document.getElementById('btn-vidsrc').click();
            }
        }

        // === BACKUP IFRAME LOGIC ===
        function changeServer(srv, btn) {
            document.querySelectorAll('.srv-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const hlsPlayer = document.getElementById('hls-player');
            const iframe = document.getElementById('video-iframe');
            
            if(hlsInstance) hlsInstance.destroy();
            hlsPlayer.pause();
            hlsPlayer.style.display = 'none';
            iframe.style.display = 'block';

            let url = "";
            if (srv === 'vidsrc') {
                url = `https://vidsrc.to/embed/anime/${animeId}/${currentEp}`;
            } else if (srv === 'vidlink') {
                url = `https://vidlink.pro/anime/${animeId}/${currentEp}`;
            } else if (srv === 'vidstream') {
                url = `https://autoembed.co/anime/mal/${animeId}/${currentEp}`;
            }
            iframe.src = url;
        }

        loadAnimeData();
    </script>
</body>
</html>
